name: Guards

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: guards-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  documentation-and-contract-guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run docs guard
        run: python3 scripts/guards/docs_guard.py

      - name: Run i18n doc guard
        run: python3 scripts/guards/i18n_doc_guard.py

      - name: Run contract guard
        run: python3 scripts/guards/contract_guard.py

      - name: Run API schema guard
        run: python3 scripts/guards/api_schema_guard.py

      - name: Run secret guard
        run: python3 scripts/guards/secret_guard.py

      - name: Run migration repair workflow check
        run: PYTHONPATH=scripts/guards python3 scripts/checks/migration_repair_workflow_check.py

      - name: Run frontend public detail check
        run: python3 scripts/checks/frontend_public_detail_check.py

      - name: Run frontend public list check
        run: python3 scripts/checks/frontend_public_list_check.py

      - name: Run frontend public style check
        run: python3 scripts/checks/frontend_public_style_check.py

      - name: Run frontend public metadata check
        run: python3 scripts/checks/frontend_public_metadata_check.py

      - name: Run frontend public canonical check
        run: python3 scripts/checks/frontend_public_canonical_check.py

      - name: Run frontend public render check
        run: python3 scripts/checks/frontend_public_render_check.py

      - name: Run frontend public cache check
        run: python3 scripts/checks/frontend_public_cache_check.py

      - name: Run frontend public sitemap check
        run: python3 scripts/checks/frontend_public_sitemap_check.py

      - name: Run frontend public RSS check
        run: python3 scripts/checks/frontend_public_rss_check.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/public-site/package-lock.json

      - name: Install public site dependencies
        run: npm ci --prefix apps/public-site

      - name: Typecheck public site
        run: npm run typecheck --prefix apps/public-site

      - name: Build public site
        run: npm run build --prefix apps/public-site
