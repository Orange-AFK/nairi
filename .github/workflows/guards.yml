name: Guards

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: guards-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  documentation-and-contract-guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run docs guard
        run: python3 scripts/guards/docs_guard.py

      - name: Run i18n doc guard
        run: python3 scripts/guards/i18n_doc_guard.py

      - name: Run contract guard
        run: python3 scripts/guards/contract_guard.py

      - name: Run API schema guard
        run: python3 scripts/guards/api_schema_guard.py

      - name: Run secret guard
        run: python3 scripts/guards/secret_guard.py

      - name: Run structural checks
        run: python3 scripts/checks/run_all_checks.py

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            apps/public-site/package-lock.json
            apps/admin/package-lock.json

      - name: Install public site dependencies
        run: npm ci --prefix apps/public-site

      - name: Typecheck public site
        run: npm run typecheck --prefix apps/public-site

      - name: Build public site
        run: npm run build --prefix apps/public-site

      - name: Install admin dependencies
        run: npm ci --prefix apps/admin

      - name: Test admin app
        run: npm test --prefix apps/admin -- --no-file-parallelism

      - name: Typecheck admin app
        run: npm run typecheck --prefix apps/admin

      - name: Build admin app
        run: npm run build --prefix apps/admin
